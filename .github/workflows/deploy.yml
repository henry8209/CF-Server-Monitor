name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🏗️ Build frontend assets
        run: npm run build:frontend

      - name: 📝 Create wrangler.toml
        run: |
          cat > wrangler.toml << 'WEOF'
          name = "server-monitor-pro"
          main = "src/index.js"
          compatibility_date = "2024-12-01"
          compatibility_flags = ["nodejs_compat"]

          # 定時任務配置（UTC）
          # - 每分鐘：執行離線節點檢測
          # - 每小時：合併執行其他定時任務（每月1號資料清理、每月8號清理舊錶、每天12點伺服器到期檢測）
          [triggers]
          crons = ["*/1 * * * *", "0 * * * *"]

          [assets]
          directory = "./dist"
          binding = "ASSETS"

          [[d1_databases]]
          binding = "DB"
          database_name = "server-monitor-db"
          database_id = "D1_PLACEHOLDER"

          # Durable Objects：即時指標廣播中心
          [[durable_objects.bindings]]
          name = "METRICS_BROADCASTER"
          class_name = "MetricsBroadcaster"

          [[migrations]]
          tag = "v1"
          new_sqlite_classes = ["MetricsBroadcaster"]

          [vars]
          API_SECRET = "SECRET_PLACEHOLDER"
          API_USER_NAME = "USER_NAME_PLACEHOLDER"
          CORS_ALLOWED_ORIGINS = "CORS_ORIGINS_PLACEHOLDER"
          WEOF

          # 替換佔位符
          sed -i "s|D1_PLACEHOLDER|${{ secrets.D1_DATABASE_ID }}|g" wrangler.toml
          sed -i "s|SECRET_PLACEHOLDER|${{ secrets.API_SECRET }}|g" wrangler.toml
          sed -i "s|USER_NAME_PLACEHOLDER|${{ secrets.API_USER_NAME }}|g" wrangler.toml
          sed -i "s|CORS_ORIGINS_PLACEHOLDER|${{ secrets.CORS_ALLOWED_ORIGINS }}|g" wrangler.toml

          echo "✅ wrangler.toml 已生成"

      # wrangler v4 的 `deploy` 會自動根據 wrangler.toml 中的 [[durable_objects.bindings]]
      # 宣告建立 DO namespace（冪等：已存在則跳過），無需單獨命令。
      # 前提：MetricsBroadcaster 類必須從 index.js 匯出（已通過 src/index.js 實現）。
      - name: 🚀 Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          wranglerVersion: '4'
          command: deploy

      - name: ✅ Deployment Success
        if: success()
        run: |
          echo "============================================"
          echo "  🎉 部署成功！"
          echo "============================================"

      - name: ❌ Deployment Failed
        if: failure()
        run: |
          echo "============================================"
          echo "  💥 部署失敗！請檢查 Actions 日誌"
          echo "============================================"