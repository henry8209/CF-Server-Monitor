# Cloudflare Workers 配置，線上已由deploy.yml接管，這裡僅供本地測試
name = "cf-server-monitor"
main = "src/index.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# 定時任務配置（UTC）
# - 每分鐘：執行離線節點檢測
# - 每小時：合併執行其他定時任務（每月1號資料清理、每月8號清理舊錶、每天12點伺服器到期檢測）
# - 注意同步修改deploy和index.js scheduled函數里面的值
[triggers]
crons = ["*/1 * * * *", "0 * * * *"]

[assets]
directory = "./dist"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "server-monitor-db"

# Durable Objects：即時指標廣播中心
# 注意：首次部署前需要執行 `wrangler durable-object create MetricsBroadcaster --class MetricsBroadcaster`
# 或者在部署後，wrangler 會自動建立對應的 DO namespace。
[[durable_objects.bindings]]
name = "METRICS_BROADCASTER"
class_name = "MetricsBroadcaster"
script_name = "cf-server-monitor"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["MetricsBroadcaster"]

[vars]
CORS_ALLOWED_ORIGINS = ""

# 開發伺服器配置
[dev]
port = 8787
local_protocol = "https"